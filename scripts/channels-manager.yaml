services:
  channels-manager:
    # 2026.03.08
    # GitHub home for this project: https://github.com/ryan-cady/channels-manager.
    # Docker Hub home for this project: https://hub.docker.com/r/bnhf/channels-manager.
    image: bnhf/channels-manager:${TAG:-latest}
    container_name: channels-manager
    dns_search: ${DOMAIN:-localdomain}
    ports:
      - ${HOST_PORT:-8090}:80
    environment:
      - CHANNELS_DVR_HOST=${CHANNELS_DVR_HOST}
    restart: unless-stopped
