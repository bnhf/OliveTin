services:
  ws-scrcpy:
    # 2026.04.23
    # GitHub home for this project with setup instructions: https://github.com/bnhf/ws-scrcpy
    # Docker container home for this project: https://hub.docker.com/r/bnhf/ws-scrcpy
    image: bnhf/ws-scrcpy:${TAG}
    container_name: ws-scrcpy
    hostname: ws-scrcpy
    dns_search: ${DOMAIN} # Specify the name of your LAN's domain, usually local or localdomain
    ports:
      - ${HOST_PORT}:8000
    environment:
      - PORTAINER_HOST=${PORTAINER_HOST}
    volumes:
      - adbtuner:/app/.config:ro
    restart: unless-stopped
volumes:
  adbtuner:
    external: true
    name: adbtuner_config
